services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: sre_agent
      POSTGRES_USER: sre_agent
      POSTGRES_PASSWORD: sre_agent
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build:
      context: ./api
    environment:
      DATABASE_URL: postgresql+asyncpg://sre_agent:sre_agent@postgres:5432/sre_agent
      INGEST_API_KEY: devkey
      INGEST_AUTH_DISABLED: "false"
      ARTIFACTS_DIR: /data/artifacts
      CORS_ORIGINS: http://localhost:3000
    depends_on:
      - postgres
    ports:
      - "8000:8000"
    volumes:
      - artifacts:/data/artifacts

  agent:
    build:
      context: ./agent
    environment:
      API_BASE: http://api:8000
      INGEST_API_KEY: devkey
      MODE: persistent
      INTERVAL_SECONDS: "10"
      LOGS_DIR: /sample-data/logs
      ARTIFACTS_DIR: /data/artifacts
    depends_on:
      - api
    volumes:
      - ./sample-data/logs:/sample-data/logs:ro
      - artifacts:/data/artifacts

  ui:
    build:
      context: ./ui
    environment:
      NEXT_PUBLIC_API_BASE: http://localhost:8000
    depends_on:
      - api
    ports:
      - "3000:3000"

volumes:
  pgdata:
  artifacts:

