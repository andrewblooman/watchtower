services:
  localstack:
    image: localstack/localstack:latest
    ports:
      - "4566:4566"
    environment:
      SERVICES: s3
      DEFAULT_REGION: us-east-1
    volumes:
      - ./localstack-init:/etc/localstack/init/ready.d
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  app:
    build:
      context: .
    environment:
      # Deployment identity (injected by EventBridge -> ECS task overrides in production)
      GITHUB_REPO: "myorg/my-service"
      COMMIT_SHA: "0000000000000000000000000000000000000000"
      SERVICE_NAME: "my-service"
      ENVIRONMENT: "production"
      # S3 (points at LocalStack for local dev)
      S3_BUCKET: "sre-agent-investigations"
      S3_PREFIX: "investigations"
      S3_REGION: "us-east-1"
      AWS_ENDPOINT_URL: "http://localstack:4566"
      AWS_ACCESS_KEY_ID: "test"
      AWS_SECRET_ACCESS_KEY: "test"
      # Bedrock (real AWS region; no local mock by default)
      BEDROCK_REGION: "us-east-1"
      BEDROCK_MODEL: "anthropic.claude-3-5-sonnet-20241022-v2:0"
      # Cache
      CACHE_DIR: "/data/cache"
      CACHE_TTL_HOURS: "6"
    depends_on:
      localstack:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - cache:/data/cache

volumes:
  cache:
